server:
  port: 8080

spring:
  application:
    name: guide-match-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

flyway:
  enabled: true
  locations: classpath:db/migration
  baseline-on-migrate: true

jwt:
  secret: GuideMatchSecretKeyForJWTTokenGeneration2024ThisIsAVeryLongSecretKeyThatMustBeAtLeast64CharactersLongForHS512Algorithm
  expiration: 86400000

ai:
  zhizengzeng:
    api:
      key: ${ZHIZENGZENG_API_KEY:sk-zk2a93f9c9d23e24a2b0c0ba4b90dcbf65a69ae310a70eac}
      url: ${ZHIZENGZENG_API_URL:https://gpt.zhizengzeng.com/v1}
      model: ${ZHIZENGZENG_MODEL:gpt-3.5-turbo}
      max-tokens: ${ZHIZENGZENG_MAX_TOKENS:500}
      temperature: ${ZHIZENGZENG_TEMPERATURE:0.7}

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver